<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#05080d" />
  <title>Kairo Control</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="app">
    <header class="header">
      <div class="badge">● ACOMPANHAMENTO PARALELO</div>
      <h1>Kairo Control</h1>
      <p>Controle rápido de fotos por campanha</p>
    </header>

    <main class="panel">
      <div class="top-actions">
        <button class="new-btn" onclick="abrirModal()">+ Nova campanha</button>
      </div>

      <div id="listaCampanhas"></div>
    </main>

    <footer>
      Dados salvos automaticamente neste aparelho
    </footer>
  </div>

  <div class="modal" id="modal">
    <div class="sheet">
      <div class="sheet-head">
        <div>
          <h2 id="modalTitulo">Nova campanha</h2>
          <p>Cadastre ou edite uma campanha.</p>
        </div>
        <button class="close" onclick="fecharModal()">×</button>
      </div>

      <input type="hidden" id="campanhaId" />

      <label>Nome da campanha</label>
      <input id="nomeCampanha" placeholder="Ex: KitKat F1" />

      <label>Meta de fotos</label>
      <input id="metaCampanha" type="number" placeholder="Ex: 29" />

      <label>Fotos já enviadas</label>
      <input id="valorCampanha" type="number" placeholder="Ex: 0" />

      <button class="save-btn" onclick="salvarCampanha()">Salvar campanha</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
